<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebas API Explorer</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eee;
    --text-muted: #999;
    --get: #61affe;
    --post: #49cc90;
    --put: #fca130;
    --delete: #f93e3e;
    --border: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--surface), var(--accent2));
    padding: 24px 32px;
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.6rem; }
  header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
  .header-controls {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .header-controls label { font-size: 0.85rem; color: var(--text-muted); }
  .header-controls input, .header-controls select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.85rem;
  }
  .header-controls input[type="text"] { width: 320px; }
  #search-box { width: 240px; }
  .layout { display: flex; min-height: calc(100vh - 140px); }
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    position: sticky;
    top: 140px;
    height: calc(100vh - 140px);
  }
  .sidebar .group-title {
    padding: 12px 16px 6px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    font-weight: 700;
    border-top: 1px solid var(--border);
  }
  .sidebar .group-title:first-child { border-top: none; }
  .sidebar a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.8rem;
    transition: background 0.15s;
    cursor: pointer;
  }
  .sidebar a:hover { background: var(--surface2); color: var(--text); }
  .sidebar a .method-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    min-width: 36px;
    text-align: center;
  }
  .main { flex: 1; padding: 24px 32px; overflow-y: auto; }
  .api-group { margin-bottom: 32px; }
  .api-group h2 {
    font-size: 1.2rem;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 16px;
  }
  .api-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .api-card:hover { border-color: var(--accent); }
  .api-card.expanded { border-color: var(--accent); }
  .api-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .api-card-header:hover { background: rgba(255,255,255,0.03); }
  .method-badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    min-width: 52px;
    text-align: center;
    text-transform: uppercase;
  }
  .method-GET { background: var(--get); color: #000; }
  .method-POST { background: var(--post); color: #000; }
  .method-PUT { background: var(--put); color: #000; }
  .method-DELETE { background: var(--delete); color: #fff; }
  .api-path { font-family: 'Consolas', 'Fira Code', monospace; font-size: 0.9rem; flex: 1; }
  .api-desc { color: var(--text-muted); font-size: 0.85rem; }
  .api-card-body {
    display: none;
    padding: 16px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .api-card.expanded .api-card-body { display: block; }
  .param-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .param-row label {
    min-width: 160px;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-family: monospace;
  }
  .param-row input, .param-row select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: monospace;
  }
  .param-row .param-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    min-width: 120px;
  }
  .body-editor {
    width: 100%;
    min-height: 100px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 0.85rem;
    resize: vertical;
    margin-bottom: 12px;
  }
  .btn-send {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 24px;
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .response-area {
    margin-top: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: none;
  }
  .response-area.visible { display: block; }
  .response-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .status-code { font-weight: 700; padding: 2px 8px; border-radius: 3px; }
  .status-2xx { background: var(--post); color: #000; }
  .status-4xx { background: var(--put); color: #000; }
  .status-5xx { background: var(--delete); color: #fff; }
  .status-0xx { background: var(--text-muted); color: #000; }
  .response-body {
    padding: 12px;
    max-height: 400px;
    overflow: auto;
    font-family: 'Consolas', monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .section-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .param-row select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: monospace;
  }
  .param-row select optgroup { color: var(--accent); font-weight: 700; }
  .param-row select option { color: var(--text); font-weight: 400; }
  .param-row input[data-manual] {
    border-left: 2px solid var(--accent) !important;
  }
  .hidden { display: none !important; }
  .chevron { transition: transform 0.2s; font-size: 0.8rem; color: var(--text-muted); }
  .expanded .chevron { transform: rotate(90deg); }
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .header-controls input[type="text"] { width: 200px; }
  }
</style>
</head>
<body>

<header>

let cardIdCounter = 0;

function renderParamRow(p, inType) {
  const labelText = inType === 'path' ? `{${p.name}}` : p.name;
  const optionKey = PARAM_OPTION_MAP[p.name];
  const options = optionKey ? KNOWN_OPTIONS[optionKey] : null;

  if (options) {
    // Render as select dropdown
    let selectHTML = `<select data-param="${p.name}" data-in="${inType}" style="flex:1">`;
    selectHTML += `<option value="">-- 選擇或手動輸入 --</option>`;

    options.forEach(opt => {
      if (opt.group && opt.items) {
        selectHTML += `<optgroup label="${opt.group}">`;
        opt.items.forEach(item => {
          selectHTML += `<option value="${item.value}">${item.label}</option>`;
        });
        selectHTML += `</optgroup>`;
      } else {
        selectHTML += `<option value="${opt.value}">${opt.label}</option>`;
      }
    });
    selectHTML += `</select>`;
    selectHTML += `<input type="text" data-param="${p.name}" data-in="${inType}" data-manual="true" placeholder="或手動輸入 ID" value="${p.default || ''}" style="flex:0.6">`;

    return `<div class="param-row">
      <label>${labelText}</label>
      ${selectHTML}
      <span class="param-hint">${p.hint || ''}</span>
    </div>`;
  }

  // Render as plain input
  return `<div class="param-row">
    <label>${labelText}</label>
    <input type="text" data-param="${p.name}" data-in="${inType}" placeholder="${p.hint || ''}" value="${p.default || ''}">
    <span class="param-hint">${p.hint || ''}</span>
  </div>`;
}

function buildUI() {
  const sidebar = document.getElementById('sidebar');
  const main = document.getElementById('main');
  let sidebarHTML = '';
  let mainHTML = '';

  API_SPEC.forEach((group, gi) => {
    const groupId = `group-${gi}`;
    sidebarHTML += `<div class="group-title">${group.group}</div>`;
    mainHTML += `<div class="api-group" id="${groupId}"><h2>${group.group}</h2>`;

    group.endpoints.forEach((ep, ei) => {
      const cardId = `card-${cardIdCounter++}`;
      const methodClass = `method-${ep.method}`;

      sidebarHTML += `<a onclick="toggleCard('${cardId}')" data-search="${ep.method} ${ep.path} ${ep.desc}">
        <span class="method-badge ${methodClass}">${ep.method}</span>
        <span>${ep.path.split('/api')[1] || ep.path}</span>
      </a>`;

      const pathParams = ep.params.filter(p => p.in === 'path');
      const queryParams = ep.params.filter(p => p.in !== 'path');

      let paramsHTML = '';
      if (pathParams.length) {
        paramsHTML += '<div class="section-label">Path Parameters</div>';
        pathParams.forEach(p => {
          paramsHTML += renderParamRow(p, 'path');
        });
      }
      if (queryParams.length) {
        paramsHTML += '<div class="section-label" style="margin-top:12px">Query Parameters</div>';
        queryParams.forEach(p => {
          paramsHTML += renderParamRow(p, 'query');
        });
      }

      let bodyHTML = '';
      if (ep.hasBody) {
        bodyHTML = `<div class="section-label" style="margin-top:12px">Request Body (JSON)</div>
          <textarea class="body-editor" data-body="true">${ep.bodyTemplate || '{\n  \n}'}</textarea>`;
      }

      mainHTML += `
        <div class="api-card" id="${cardId}" data-base="${ep.base || group.base}" data-method="${ep.method}" data-path="${ep.path}" data-search="${ep.method} ${ep.path} ${ep.desc}">
          <div class="api-card-header" onclick="toggleCard('${cardId}')">
            <span class="chevron">&#9654;</span>
            <span class="method-badge ${methodClass}">${ep.method}</span>
            <span class="api-path">${ep.path}</span>
            <span class="api-desc">${ep.desc}</span>
          </div>
          <div class="api-card-body">
            ${paramsHTML}
            ${bodyHTML}
            <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
              <button class="btn-send" onclick="sendRequest('${cardId}')">Send Request</button>
              <span class="loading-text" style="display:none;color:var(--text-muted);font-size:0.85rem;">Loading...</span>
            </div>
            <div class="response-area">
              <div class="response-header">
                <span>Response</span>
                <span class="status-code"></span>
              </div>
              <pre class="response-body"></pre>
            </div>
          </div>
        </div>`;
    });
    mainHTML += '</div>';
  });

  sidebar.innerHTML = sidebarHTML;
  main.innerHTML = mainHTML;
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  card.classList.toggle('expanded');
  if (card.classList.contains('expanded')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

async function sendRequest(cardId) {
  const card = document.getElementById(cardId);
  const method = card.dataset.method;
  let path = card.dataset.path;
  const baseSelect = document.getElementById('base-url-select');
  let base = card.dataset.base || baseSelect.value;
  const token = document.getElementById('global-token').value.trim();

  // Helper: get param value (manual input overrides select)
  function getParamValue(paramName, inType) {
    const manual = card.querySelector(`input[data-param="${paramName}"][data-in="${inType}"][data-manual="true"]`);
    if (manual && manual.value.trim()) return manual.value.trim();
    const select = card.querySelector(`select[data-param="${paramName}"][data-in="${inType}"]`);
    if (select && select.value) return select.value;
    const input = card.querySelector(`input[data-param="${paramName}"][data-in="${inType}"]:not([data-manual])`);
    if (input && input.value.trim()) return input.value.trim();
    return '';
  }

  // Replace path params
  const pathEls = card.querySelectorAll('[data-in="path"]');
  const pathParamNames = new Set();
  pathEls.forEach(el => pathParamNames.add(el.dataset.param));
  pathParamNames.forEach(name => {
    const val = getParamValue(name, 'path');
    path = path.replace(`{${name}}`, encodeURIComponent(val));
  });

  // Build query string
  const queryEls = card.querySelectorAll('[data-in="query"]');
  const queryParamNames = new Set();
  queryEls.forEach(el => queryParamNames.add(el.dataset.param));
  const params = new URLSearchParams();
  queryParamNames.forEach(name => {
    const val = getParamValue(name, 'query');
    if (val) params.append(name, val);
  });
  const qs = params.toString();
  const url = base + path + (qs ? '?' + qs : '');

  const headers = { 'Accept': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  // Route through local proxy to bypass CORS
  const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
  const fetchOpts = { method, headers };

  // Body
  const bodyArea = card.querySelector('textarea[data-body]');
  if (bodyArea && (method === 'POST' || method === 'PUT')) {
    headers['Content-Type'] = 'application/json';
    fetchOpts.body = bodyArea.value;
  }

  const btn = card.querySelector('.btn-send');
  const loadingText = card.querySelector('.loading-text');
  const responseArea = card.querySelector('.response-area');
  const statusEl = responseArea.querySelector('.status-code');
  const bodyEl = responseArea.querySelector('.response-body');

  btn.disabled = true;
  loadingText.style.display = 'inline';
  responseArea.classList.add('visible');
  statusEl.textContent = '...';
  statusEl.className = 'status-code';
  bodyEl.textContent = `→ ${method} ${url}\n  (via proxy)\n\n`;

  try {
    const resp = await fetch(proxyUrl, fetchOpts);
    const status = resp.status;
    statusEl.textContent = `${status} ${resp.statusText}`;
    if (status >= 200 && status < 300) statusEl.classList.add('status-2xx');
    else if (status >= 400 && status < 500) statusEl.classList.add('status-4xx');
    else if (status >= 500) statusEl.classList.add('status-5xx');
    else statusEl.classList.add('status-0xx');

    const contentType = resp.headers.get('content-type') || '';
    let text;
    if (contentType.includes('json')) {
      const json = await resp.json();
      text = JSON.stringify(json, null, 2);
    } else {
      text = await resp.text();
      try {
        const json = JSON.parse(text);
        text = JSON.stringify(json, null, 2);
      } catch {}
    }
    bodyEl.textContent = text;
  } catch (err) {
    statusEl.textContent = 'Error';
    statusEl.classList.add('status-5xx');
    bodyEl.textContent = err.message + '\n\n請確認代理伺服器正在運行：node server.mjs';
  }
  btn.disabled = false;
  loadingText.style.display = 'none';
}

// Search
document.getElementById('search-box').addEventListener('input', function() {
  const query = this.value.toLowerCase();
  document.querySelectorAll('.api-card').forEach(card => {
    const match = card.dataset.search.toLowerCase().includes(query);
    card.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.api-group').forEach(group => {
    const visible = group.querySelectorAll('.api-card:not([style*="display: none"])');
    group.style.display = visible.length ? '' : 'none';
  });
  document.querySelectorAll('.sidebar a').forEach(link => {
    const match = (link.dataset.search || '').toLowerCase().includes(query);
    link.style.display = match ? '' : 'none';
  });
});
