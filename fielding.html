<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const POSITIONS = [
  { key: 1, label: 'P' },
  { key: 2, label: 'C' },
  { key: 3, label: '1B' },
  { key: 4, label: '2B' },
  { key: 5, label: '3B' },
  { key: 6, label: 'SS' },
  { key: 7, label: 'LF' },
  { key: 8, label: 'CF' },
  { key: 9, label: 'RF' },
];

// ==========================================
// API
// ==========================================
async function proxyFetch(apiPath) {
  const target = `https://www.rebas.tw${apiPath}`;
  const resp = await fetch(`/proxy?url=${encodeURIComponent(target)}`);
  
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(`Proxy 錯誤 (${resp.status}): ${text.slice(0, 100)}`);
  }
  
  const ct = resp.headers.get('content-type') || '';
  if (!ct.includes('json')) {
    const text = await resp.text();
    throw new Error(`API (${apiPath}) 回傳非 JSON (Content-Type: ${ct})。預覽：${text.slice(0, 100)}...`);
  }
  
  return resp.json();
}

async function fetchWithConcurrency(paths, limit, onProgress) {
  const results = new Array(paths.length);
  let completed = 0;
  let idx = 0;

  async function worker() {
    while (idx < paths.length) {
      const i = idx++;
      try {
        results[i] = await proxyFetch(paths[i]);
      } catch {
        results[i] = null;
      }
      completed++;
      onProgress(completed, paths.length);
    }
  }

  await Promise.all(Array.from({ length: limit }, () => worker()));
  return results;
}

// ==========================================
// Compute fielding innings
// ==========================================
function outsToIP(totalOuts) {
  const full = Math.floor(totalOuts / 3);
  const rem = totalOuts % 3;
  return `${full}.${rem}`;
}

function computeFielding(gamesData, teamLookup) {
  // Each player entry: { ..., positions: { [pos]: { outs, po, a } } }
  const players = {};

  function ensurePlayer(uniqid, name, number, fieldingTeamUniqid) {
    const key = `${uniqid}_${fieldingTeamUniqid}`;
    if (!players[key]) {
      const team = teamLookup[fieldingTeamUniqid] || {};
      players[key] = {
        uniqid,
        name: name || '',
        number: number || '',
        teamUniqid: fieldingTeamUniqid,
        teamName: team.name || '',
        teamAbbr: team.abbr || '',
        teamColor: team.color || '#999',
        positions: {},
      };
    }
    return players[key];
  }

  function ensurePos(playerObj, pos) {
    if (!playerObj.positions[pos]) playerObj.positions[pos] = { outs: 0, po: 0, a: 0 };
    return playerObj.positions[pos];
  }

  function creditOuts(fielders, outsCount, fieldingTeamUniqid) {
    if (outsCount <= 0 || !fielders || !fielders.length) return;
    fielders.forEach(f => {
      const pos = f.position;
      if (pos < 1 || pos > 9) return;
      const p = f.fielder;
      if (!p || !p.uniqid) return;
      const playerObj = ensurePlayer(p.uniqid, p.name, p.number, fieldingTeamUniqid);
      ensurePos(playerObj, pos).outs += outsCount;
    });
  }

  // Extract fielding chain from events array (e.g. "643" → [6,4,3])
  function getFieldingChain(pa) {
    const events = pa.events || [];
    for (let i = events.length - 1; i >= 0; i--) {
      if (events[i].in_play) {
        const fp = events[i].pitch?.fielder_position || '';
        const digits = [...fp].filter(c => c >= '1' && c <= '9').map(Number);
        if (digits.length > 0) return digits;
        break;
      }
    }
    return [];
  }

  // Credit PO/A using events[].pitch.fielder_position (the actual fielding chain)
  function creditPOA(pa, fielders, fieldingTeamUniqid) {
    const result = pa.result || '';
    const outsRecorded = Math.max(0, (pa.end_outs || 0) - (pa.outs || 0));
    if (outsRecorded === 0) return;

    // Build fielder lookup: position -> player info
    const fMap = {};
    (fielders || []).forEach(f => {
      if (f.position >= 1 && f.position <= 9 && f.fielder?.uniqid) {
        fMap[f.position] = f.fielder;
      }
    });

    function addPO(pos) {
      const p = fMap[pos];
      if (p) ensurePos(ensurePlayer(p.uniqid, p.name, p.number, fieldingTeamUniqid), pos).po++;
    }
    function addA(pos) {
      const p = fMap[pos];
      if (p) ensurePos(ensurePlayer(p.uniqid, p.name, p.number, fieldingTeamUniqid), pos).a++;
    }

    if (result === 'SO') {
      addPO(2);
      return;
    }

    const chain = getFieldingChain(pa);
    if (chain.length === 0) return;

    if (result === 'FO' || result === 'SF') {
      // Fly out: catching fielder gets PO (first in chain)
      addPO(chain[0]);
    } else if (result === 'GO' || result === 'FC' || result === 'SH') {
      // Ground out / FC / Sac bunt: last in chain = PO, rest = A
      if (chain.length === 1) {
        addPO(chain[0]); // unassisted
      } else {
        for (let i = 0; i < chain.length - 1; i++) addA(chain[i]);
        addPO(chain[chain.length - 1]);
      }
    } else if (result === 'GIDP') {
      // Double play: chain like 643 → 6=A, 4=A+PO(force at 2B), 3=PO(force at 1B)
      if (chain.length >= 3) {
        addA(chain[0]);
        for (let i = 1; i < chain.length - 1; i++) { addA(chain[i]); addPO(chain[i]); }
        addPO(chain[chain.length - 1]);
      } else if (chain.length === 2) {
        addA(chain[0]);
        addPO(chain[0]); // turning the DP
        addPO(chain[1]);
      } else {
        addPO(chain[0]); // unassisted DP (rare)
      }
    }
  }

  gamesData.forEach(gameResp => {
    if (!gameResp) return;
    const game = gameResp.data || gameResp;
    const paList = game.PA_list;
    if (!paList || !paList.length) return;

    const homeTeam = game.home?.team_uniqid || '';
    const awayTeam = game.away?.team_uniqid || '';

    // Group PAs by half-inning to detect between-PA outs
    const halfInnings = {};
    paList.forEach(pa => {
      const key = `${pa.inning}_${pa.side}`;
      if (!halfInnings[key]) halfInnings[key] = [];
      halfInnings[key].push(pa);
    });

    Object.values(halfInnings).forEach(pas => {
      for (let i = 0; i < pas.length; i++) {
        const pa = pas[i];
        const fielders = pa.fielders;
        if (!fielders || !fielders.length) continue;
        const fieldingTeamUniqid = pa.side === 'AWAY' ? homeTeam : awayTeam;

        // 1. Between-PA outs (caught stealing, pickoff)
        if (i > 0) {
          const prevEndOuts = pas[i - 1].end_outs || 0;
          const gapOuts = (pa.outs || 0) - prevEndOuts;
          if (gapOuts > 0) {
            creditOuts(fielders, gapOuts, fieldingTeamUniqid);
            // Gap outs (CS/pickoff): credit catcher PO for CS
            const p2 = fielders.find(f => f.position === 2)?.fielder;
            if (p2?.uniqid) {
              for (let g = 0; g < gapOuts; g++) {
                ensurePos(ensurePlayer(p2.uniqid, p2.name, p2.number, fieldingTeamUniqid), 2).po++;
              }
            }
          }
        }

        // 2. Outs during this PA
        const outsThisPA = Math.max(0, (pa.end_outs || 0) - (pa.outs || 0));
        creditOuts(fielders, outsThisPA, fieldingTeamUniqid);

        // 3. PO/A from location_code
        creditPOA(pa, fielders, fieldingTeamUniqid);
      }
    });
  });

  return Object.values(players);
}

// ==========================================
// Components
// ==========================================
function Loading({ message, progress, total }) {
  const pct = total > 0 ? Math.round((progress / total) * 100) : 0;
  return (
    <div className="loading-container">
      <div className="spinner" />
      <div>{message}</div>
      {total > 0 && (
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{ width: `${pct}%` }} />
        </div>
      )}
    </div>
  );
}

function ErrorBox({ message }) {
  return <div className="error-box">{message}</div>;
}

// Flatten players into one row per player-position
function flattenByPosition(players) {
  const rows = [];
  players.forEach(player => {
    POSITIONS.forEach(pos => {
      const d = player.positions[pos.key];
      if (!d || d.outs <= 0) return;
      const ip = d.outs / 3;
      const rf9 = ip > 0 ? ((d.po + d.a) / ip) * 9 : 0;
      rows.push({
        uniqid: player.uniqid,
        name: player.name,
        number: player.number,
        teamUniqid: player.teamUniqid,
        teamName: player.teamName,
        teamAbbr: player.teamAbbr,
        teamColor: player.teamColor,
        pos: pos.key,
        posLabel: pos.label,
        outs: d.outs,
        po: d.po,
        a: d.a,
        rf9,
      });
    });
  });
  return rows;
}

function FieldingTable({ data, teamFilter, posFilter, qualFilter, getQualOuts }) {
  const [sortKey, setSortKey] = useState('rf9');
  const [sortAsc, setSortAsc] = useState(false);

  const rows = useMemo(() => flattenByPosition(data), [data]);

  const filtered = useMemo(() => {
    let list = rows;
    if (teamFilter) list = list.filter(r => r.teamUniqid === teamFilter);
    if (posFilter) list = list.filter(r => r.pos === Number(posFilter));
    if (qualFilter) list = list.filter(r => r.outs >= getQualOuts(r.teamUniqid));
    return list;
  }, [rows, teamFilter, posFilter, qualFilter, getQualOuts]);

  const sorted = useMemo(() => {
    const list = [...filtered];
    list.sort((a, b) => {
      let va, vb;
      if (sortKey === 'name') {
        va = a.name; vb = b.name;
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      } else if (sortKey === 'team') {
        va = a.teamName; vb = b.teamName;
        return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      } else if (sortKey === 'pos') {
        va = a.pos; vb = b.pos;
      } else {
        va = a[sortKey] || 0; vb = b[sortKey] || 0;
      }
      return sortAsc ? va - vb : vb - va;
    });
    return list;
  }, [filtered, sortKey, sortAsc]);

  function handleSort(key) {
    if (sortKey === key) setSortAsc(!sortAsc);
    else { setSortKey(key); setSortAsc(key === 'name' || key === 'team' || key === 'pos'); }
  }

  const arrow = (key) => sortKey === key ? (sortAsc ? ' \u2191' : ' \u2193') : '';

  return (
    <div className="card">
      <div className="field-table-wrap">
        <table className="field-table">
          <thead>
            <tr>
              <th className={sortKey === 'name' ? 'sorted' : ''} onClick={() => handleSort('name')}>
                球員{arrow('name')}
              </th>
              <th className={sortKey === 'team' ? 'sorted' : ''} onClick={() => handleSort('team')}>
                球隊{arrow('team')}
              </th>
              <th className={sortKey === 'pos' ? 'sorted' : ''} onClick={() => handleSort('pos')}>
                守位{arrow('pos')}
              </th>
              <th className={sortKey === 'outs' ? 'sorted' : ''} onClick={() => handleSort('outs')}>
                IP{arrow('outs')}
              </th>
              <th className={sortKey === 'po' ? 'sorted' : ''} onClick={() => handleSort('po')}>
                PO{arrow('po')}
              </th>
              <th className={sortKey === 'a' ? 'sorted' : ''} onClick={() => handleSort('a')}>
                A{arrow('a')}
              </th>
              <th className={sortKey === 'rf9' ? 'sorted' : ''} onClick={() => handleSort('rf9')}>
                RF/9{arrow('rf9')}
              </th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(row => (
              <tr key={`${row.uniqid}_${row.teamUniqid}_${row.pos}`}>
                <td>
                  <div className="team-cell">
                    <div className="team-color-bar" style={{ background: row.teamColor }} />
                    <a href={`/player.html?id=${row.uniqid}`} className="player-link">{row.name}</a>
                    {row.number && <span className="player-number">#{row.number}</span>}
                  </div>
                </td>
                <td className="team-abbr">
                  <a href={`/team.html?id=${row.teamUniqid}`} className="team-link">{row.teamAbbr || row.teamName}</a>
                </td>
                <td style={{ fontWeight: 600 }}>{row.posLabel}</td>
                <td className="ip-total">{outsToIP(row.outs)}</td>
                <td style={{ fontWeight: 600 }}>{row.po}</td>
                <td style={{ fontWeight: 600 }}>{row.a}</td>
                <td style={{ fontWeight: 700, color: row.rf9 > 0 ? 'var(--accent)' : 'var(--text-muted)' }}>
                  {row.outs > 0 ? row.rf9.toFixed(2) : '-'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ==========================================
// Season Data (Project Standard from standings.html)
// ==========================================
const SEASONS_LIST = [
  { group: '2026', items: [
    { id: 'CPBL-2026-oB', label: '2026 例行賽' },
    { id: 'CPBL-2026-4j', label: '2026 熱身賽' },
  ]},
  { group: '2025', items: [
    { id: 'CPBL-2025-JO', label: '2025 例行賽' },

];

const ALL_SEASONS = SEASONS_LIST.flatMap(g => g.items);
const DEFAULT_SEASON_ID = 'CPBL-2026-oB';

// ==========================================
// App
// ==========================================
function App() {
  const [currentSeasonId, setCurrentSeasonId] = useState('');
  const [currentSeasonLabel, setCurrentSeasonLabel] = useState('');
  const [fieldingData, setFieldingData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadMsg, setLoadMsg] = useState('載入資料...');
  const [progress, setProgress] = useState(0);
  const [total, setTotal] = useState(0);
  const [error, setError] = useState(null);
  const [finishedCount, setFinishedCount] = useState(0);
  const [teamGameCounts, setTeamGameCounts] = useState({});
  const [teamFilter, setTeamFilter] = useState('');
  const [posFilter, setPosFilter] = useState('');
  const [qualFilter, setQualFilter] = useState(false);

  // Initialize: Pick initial season
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlSid = params.get('seasonId');
    const sid = urlSid || DEFAULT_SEASON_ID;
    
    setCurrentSeasonId(sid);
    const s = ALL_SEASONS.find(x => x.id === sid);
    if (s) setCurrentSeasonLabel(s.label);
  }, []);

  // Main data loader: Triggers when currentSeasonId changes
  useEffect(() => {
    if (!currentSeasonId) return;

    async function loadData() {
      setLoading(true);
      setError(null);
      setProgress(0);
      setTotal(0);
      try {
        // 1. Fetch season info for team lookup
        setLoadMsg('載入球隊資料...');
        const seasonResp = await proxyFetch(`/api/seasons/${currentSeasonId}`);
        const seasonData = seasonResp.data;
        const teamLookup = {};
        (seasonData.standings || []).forEach(s => {
          const t = s.team;
          teamLookup[t.uniqid] = {
            name: t.name,
            abbr: t.abbr,
            color: (t.hex_color || '').split(';')[0] || '#999',
          };
        });

        // 2. Fetch game list
        setLoadMsg('載入比賽列表...');
        const gamesResp = await proxyFetch(`/api/seasons/${currentSeasonId}/games?type=grouped`);
        const allGames = gamesResp.data || [];
        const finished = allGames.filter(g => g.info?.status === 'FINISHED');
        setFinishedCount(finished.length);

        // Count finished games per team
        const tgc = {};
        finished.forEach(g => {
          const h = g.home?.team_uniqid;
          const a = g.away?.team_uniqid;
          if (h) tgc[h] = (tgc[h] || 0) + 1;
          if (a) tgc[a] = (tgc[a] || 0) + 1;
        });
        setTeamGameCounts(tgc);

        if (finished.length === 0) {
          setFieldingData([]);
          setLoading(false);
          return;
        }

        // 3. Fetch each game detail
        setTotal(finished.length);
        const paths = finished.map(g => `/api/seasons/${currentSeasonId}/games/${g.uniqid}`);
        const gameDetails = await fetchWithConcurrency(paths, 3, (done, tot) => {
          setProgress(done);
          setLoadMsg(`載入比賽資料 ${done}/${tot}...`);
        });

        // 4. Compute fielding
        setLoadMsg('計算守備局數...');
        const data = computeFielding(gameDetails, teamLookup);
        setFieldingData(data);
        setLoading(false);
      } catch (err) {
        setError(err.message);
        setLoading(false);
      }
    }
    loadData();
  }, [currentSeasonId]);

  function handleSeasonChange(sid) {
    setCurrentSeasonId(sid);
    const s = ALL_SEASONS.find(x => x.id === sid);
    if (s) setCurrentSeasonLabel(s.label);
    // Update URL without reload
    const url = new URL(window.location);
    url.searchParams.set('seasonId', sid);
    window.history.pushState({}, '', url);
  }

  const teams = useMemo(() => {
    const map = {};
    fieldingData.forEach(p => {
      if (p.teamUniqid && !map[p.teamUniqid]) {
        map[p.teamUniqid] = { name: p.teamName, abbr: p.teamAbbr, color: p.teamColor };
      }
    });
    return Object.entries(map).map(([id, t]) => ({ id, ...t })).sort((a, b) => a.name.localeCompare(b.name));
  }, [fieldingData]);

  // 規定局數 = 該隊已賽場次 * 3 outs
  function getQualOuts(teamId) {
    return (teamGameCounts[teamId] || 0) * 3;
  }

  const rowCount = useMemo(() => {
    let list = flattenByPosition(fieldingData);
    if (teamFilter) list = list.filter(r => r.teamUniqid === teamFilter);
    if (posFilter) list = list.filter(r => r.pos === Number(posFilter));
    if (qualFilter) list = list.filter(r => r.outs >= getQualOuts(r.teamUniqid));
    return list.length;
  }, [fieldingData, teamFilter, posFilter, qualFilter, teamGameCounts]);

  return (
    <>
      <div className="header">
        <div className="header-inner">
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
            <h1><span>CPBL</span> 守備局數 / RF</h1>
            <a href="/index.html" className="nav-link">API Explorer</a>
            <a href="/standings.html" className="nav-link">戰績表</a>
          </div>
          <div className="filter-bar" style={{ marginBottom: 0 }}>
            <select value={currentSeasonId} onChange={e => handleSeasonChange(e.target.value)} disabled={loading && ALL_SEASONS.length === 0}>
              {SEASONS_LIST.map(g => (
                <optgroup key={g.group} label={g.group}>
                  {g.items.map(s => (
                    <option key={s.id} value={s.id}>{s.label}</option>
                  ))}
                </optgroup>
              ))}
            </select>
          </div>
        </div>
      </div>

      <div className="content">
        {loading && <Loading message={loadMsg} progress={progress} total={total} />}
        {error && <ErrorBox message={`載入失敗：${error}`} />}

        {!loading && !error && (
          <>
            <div className="section">
              <div className="card">
                <div className="meta-bar">
                  <span><strong>{currentSeasonLabel}</strong></span>
                  <span className="dot" />
                  <span>已完成 {finishedCount} 場</span>
                  <span className="dot" />
                  <span>{rowCount} 筆紀錄</span>
                </div>
              </div>
            </div>

            <div className="section">
              <div className="section-title">守備成績（按守位分列）</div>
              <div className="filter-bar">
                <label>篩選球隊：</label>
                <select value={teamFilter} onChange={e => setTeamFilter(e.target.value)}>
                  <option value="">全部球隊</option>
                  {teams.map(t => (
                    <option key={t.id} value={t.id}>{t.name}</option>
                  ))}
                </select>
                <label style={{ marginLeft: '16px' }}>篩選守位：</label>
                <select value={posFilter} onChange={e => setPosFilter(e.target.value)}>
                  <option value="">全部守位</option>
                  {POSITIONS.map(pos => (
                    <option key={pos.key} value={pos.key}>{pos.label}</option>
                  ))}
                </select>
                <label style={{ marginLeft: '16px', display: 'inline-flex', alignItems: 'center', gap: '4px', cursor: 'pointer' }}>
                  <input type="checkbox" checked={qualFilter} onChange={e => setQualFilter(e.target.checked)} />
                  規定局數（≥ 該隊已賽場次 IP）
                </label>
              </div>
              <FieldingTable data={fieldingData} teamFilter={teamFilter} posFilter={posFilter} qualFilter={qualFilter} getQualOuts={getQualOuts} />
            </div>
          </>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
